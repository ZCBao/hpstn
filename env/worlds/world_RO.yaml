world:
  world_width: 12.0       # meter
  world_height: 12.0      # meter
  world_origin_x: -1.0    # meter
  world_origin_y: -1.0    # meter
  # world_map: 'test.png'
  # map_origin_x: 0.0       # meter
  # map_origin_y: 0.0       # meter
  # map_resolution: 0.1     # meter
  square: [0.0, 0.0, 10.0, 10.0]  # [min_x, min_y, max_x, max_y]
  circle: [5.0, 5.0, 5.0]         # [center_x, center_y, radius]
  # square: [0.5, 0.5, 9.5, 9.5]  # [min_x, min_y, max_x, max_y]
  # circle: [5.0, 5.0, 4.0]       # [center_x, center_y, radius]
  step_time: 0.1          # second


robots:
  robot_mode: 'diff' # omni or diff or ros
  robot_vel_min: [ 0.0, -1.5] # [vx, wz] for diff, [vx, vy] for omni, [vx, vy, wz] for ros
  robot_vel_max: [ 1.5,  1.5] # [vx, wz] for diff, [vx, vy] for omni, [vx, vy, wz] for ros
  robot_init_mode: 1  # 0: custom; 1: random; 2: circle_uniform; 3: circle_random; 4: passage_uniform; 5: passage_random
  robot_radius_list: [0.2, 0.2, 0.2, 0.2]
  robot_footprint_list: [[0.20, 0.20, 0.15, 0.15], [0.20, 0.20, 0.15, 0.15], [0.20, 0.20, 0.15, 0.15]] # [front, rear, left, right] to the rotation center
  robot_start_list: [[1.0, 1.0, 0.0], [9.0, 9.0, 0.0]]
  robot_goal_list:  [[9.0, 9.0, 0.0], [1.0, 1.0, 0.0]]
  robot_random_yaw: True
  robot_random_radius: False
  robot_random_footprint: False
  robot_interval: 1.0
  robot_task_interval: 1.0

  lidar2d:
    install_pos: [0.0, 0.0, 0.0]  # relative to the robot center: [x, y, theta]
    range_min: 0.0
    range_max: 5.0
    angle_min: -1.5708
    angle_max:  1.5708
    range_num: 180


